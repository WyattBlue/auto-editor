<!DOCTYPE html>
<html lang="{{ .Lang }}">
<head>
  <meta charset="UTF-8">
  <title>Auto-Editor cli for wasm</title>
  {{ head_icon }}
  <style>
  {{ core_style }}
  label { color: var(--charcoal-100) }
  input, button, select { margin: 4px 0 }
  .notice { color: var(--charcoal-400) }
  #log {
    font-family: monospace;
    background: #111;
    color: #eee;
    padding: 12px;
    height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    font-size: 13px;
    margin-top: 12px;
  }
  button { cursor: pointer; padding: 6px 14px; }
  #downloadArea { margin-top: 12px; }
  .tabs { display: flex; margin-bottom: -1px; }
  .tab-btn { padding: 7px 18px; border: 1px solid #555; background: #1a1a1a; color: #888;
             cursor: pointer; margin: 0}
  .tab-btn.active { background: #2a2a2a; color: #eee; }
  .tab-panel { display: none; border: 1px solid #555; padding: 16px 12px; }
  .tab-panel.active { display: block; }
  </style>
</head>
<body>
  {{ nav }}
<section class="section">
<div class="container">
  <h1 class="hero-title">
    <p>Auto-Editor cli for wasm</p>
  </h1>
  <p id="memNotice" class="tiny notice" style="display:none">wasm32 fallback has a memory limit of 4GB. Importing or exporting big files may fail.</p>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('main', this)">Main</button>
    <button class="tab-btn" onclick="switchTab('info', this)">Info</button>
    <button class="tab-btn" onclick="switchTab('whisper', this)">Whisper</button>
  </div>

  <div id="tab-main" class="tab-panel active">
    <label>Input files: <input type="file" id="fileInput" multiple></label><br>
    <label>Other files (e.g. <code>example.srt</code>) [optional]: <input type="file" id="otherFilesInput" multiple></label><br>
    <label>Arguments: <input type="text" id="argsInput" value="-c:v h264" size="40"></label><br>
    <button id="runBtn" onclick="runEditor()">Run</button>
    <button onclick="clearLog()">Clear log</button>
  </div>

  <div id="tab-whisper" class="tab-panel">
    <label>Input file: <input type="file" id="whisperFileInput"></label><br>
    <label>Model file: <input type="file" id="whisperModel" accept=".bin"></label><br>
    <label>Arguments: <input type="text" id="whisperArgs" value="" size="40"></label><br>
    <button id="whisperRunBtn" onclick="runWhisper()">Run</button>
    <button onclick="clearLog()">Clear log</button>
  </div>

  <div id="tab-info" class="tab-panel">
    <label>Input files: <input type="file" id="infoFileInput" multiple></label><br>
    <button id="infoRunBtn" onclick="runInfo()">Run</button>
    <button onclick="clearLog()">Clear log</button>
  </div>

  <div id="log"></div>
  <div id="downloadArea"></div>

  <script>
    // Feature-detect wasm64 (memory section with i64 limits flag = 0x04).
    const hasWasm64 = WebAssembly.validate(new Uint8Array([
      0,97,115,109, 1,0,0,0, 5,3,1,4,1
    ]));
    if (!hasWasm64) document.getElementById('memNotice').style.display = '';
    const wasmBase = hasWasm64 ? 'auto-editor-web64' : 'auto-editor-web';
    const wasmBinaryPromise = fetch(wasmBase + '.wasm').then(r => r.arrayBuffer());
    const mainScriptBlobPromise = fetch(wasmBase + '.js')
      .then(r => r.blob())
      .then(blob => {
        const url = URL.createObjectURL(blob);
        return new Promise((resolve) => {
          const s = document.createElement('script');
          s.src = url;
          s.onload = () => resolve(url);
          document.head.appendChild(s);
        });
      });

    let progressLineActive = false;
    const pendingOutput = [];
    let rafPending = false;
    let logText = '';

    function switchTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      btn.classList.add('active');
      clearLog();
    }

    function clearLog() {
      document.getElementById('log').textContent = '';
      document.getElementById('downloadArea').replaceChildren();
      for (const url of downloadUrls) URL.revokeObjectURL(url);
      downloadUrls = [];
      progressLineActive = false;
      pendingOutput.length = 0;
      rafPending = false;
      logText = '';
    }

    function stripAnsi(str) {
      return str.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '');
    }

    function flushOutput() {
      rafPending = false;
      if (pendingOutput.length === 0) return;
      const el = document.getElementById('log');
      let text = logText;
      for (const {msg, isProgress} of pendingOutput) {
        if (isProgress) {
          if (progressLineActive) {
            const lastNl = text.lastIndexOf('\n', text.length - 2);
            text = text.substring(0, lastNl + 1) + msg + '\n';
          } else {
            text += msg + '\n';
            progressLineActive = true;
          }
        } else {
          text += msg + '\n';
          progressLineActive = false;
        }
      }
      pendingOutput.length = 0;
      logText = text;
      el.textContent = text;
      el.scrollTop = el.scrollHeight;
    }

    function handleOutput(text) {
      const clean = stripAnsi(text);
      const isProgress = clean.includes('\r');
      pendingOutput.push({msg: isProgress ? clean.replace(/\r/g, '').trimEnd() : clean, isProgress});
      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(flushOutput);
      }
    }

    function fmtSize(n) {
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      return (n / 1024 / 1024).toFixed(1) + ' MB';
    }

    let downloadUrls = [];
    function clearDownloads() {
      for (const url of downloadUrls) URL.revokeObjectURL(url);
      downloadUrls = [];
      document.getElementById('downloadArea').replaceChildren();
    }
    function addDownload(data, name) {
      const blob = data instanceof Blob ? data : new Blob([data]);
      const url = URL.createObjectURL(blob);
      downloadUrls.push(url);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      a.textContent = `Download ${name} (${fmtSize(blob.size)})`;
      a.style.display = 'block';
      a.style.width = 'fit-content';
      document.getElementById('downloadArea').appendChild(a);
    }

    async function runModule(btn, args, entries) {
      btn.disabled = true;
      clearDownloads();
      try {
        const buffers = await Promise.all(
          entries.map(({file}) => file.arrayBuffer().then(b => new Uint8Array(b)))
        );
        handleOutput('<wasm>auto-editor ' + args.join(' ') + '</wasm>');

        let resolve, reject;
        const done = new Promise((res, rej) => { resolve = res; reject = rej; });

        let mod;
        try {
          mod = await AutoEditor({
            arguments: args,
            preRun: [(m) => entries.forEach(({path}, i) => m.FS.writeFile(path, buffers[i]))],
            print:    handleOutput,
            printErr: handleOutput,
            wasmBinary: await wasmBinaryPromise,
            mainScriptUrlOrBlob: await mainScriptBlobPromise,
            onExit: (code) => code === 0 ? resolve() : reject(new Error('exited with code ' + code)),
          });
        } catch (e) {
          handleOutput('<wasm>module init failed: ' + e + '</wasm>');
          return null;
        }

        try {
          await done;
        } catch (e) {
          handleOutput('<wasm>' + e.message + '</wasm>');
          return null;
        }

        return mod;
      } finally {
        btn.disabled = false;
      }
    }

    async function runEditor() {
      const fileEl = document.getElementById('fileInput');
      const otherEl = document.getElementById('otherFilesInput');
      const extraArgs = document.getElementById('argsInput').value.trim().split(/\s+/).filter(Boolean);

      const inputFiles = Array.from(fileEl.files).map(f => ({file: f, path: '/' + f.name}));
      const otherFiles = Array.from(otherEl.files).map(f => ({file: f, path: '/' + f.name}));
      const allFiles = [...inputFiles, ...otherFiles];
      const args = [...inputFiles.map(e => e.path), ...extraArgs];

      const mod = await runModule(document.getElementById('runBtn'), args, allFiles);
      offerOutputDownloads(mod, allFiles);
    }

    // Scan FS root for anything the run produced and offer each as a download.
    function offerOutputDownloads(mod, inputFiles) {
      if (!mod) return;
      const skip = new Set(['tmp', 'home', 'dev', 'proc']);
      const inputSet = new Set(inputFiles.map(e => e.path));
      const outputs = [];
      for (const name of mod.FS.readdir('/')) {
        if (name === '.' || name === '..' || skip.has(name)) continue;
        const path = '/' + name;
        if (inputSet.has(path)) continue;
        let st;
        try { st = mod.FS.stat(path); } catch (e) { continue; }
        if (mod.FS.isFile(st.mode)) outputs.push({name, path});
      }
      if (outputs.length === 0) {
        handleOutput('<wasm>no output files produced</wasm>');
        return;
      }
      for (const {name, path} of outputs) {
        let data;
        try { data = mod.FS.readFile(path); }
        catch (e) { handleOutput('<wasm>could not read ' + path + ': ' + e + '</wasm>'); continue; }
        addDownload(data, name);
      }
    }

    async function runWhisper() {
      const fileEl = document.getElementById('whisperFileInput');
      const modelEl = document.getElementById('whisperModel');
      if (!fileEl.files.length) { handleOutput('No file selected.'); return; }
      if (!modelEl.files.length) { handleOutput('No model file selected.'); return; }
      const file = fileEl.files[0];
      const inputPath = '/' + file.name;
      const extraArgs = document.getElementById('whisperArgs').value.trim().split(/\s+/).filter(Boolean);

      const inputFiles = [{file, path: inputPath}, {file: modelEl.files[0], path: '/model.bin'}];
      const mod = await runModule(
        document.getElementById('whisperRunBtn'),
        ['whisper', inputPath, '/model.bin', ...extraArgs],
        inputFiles
      );
      offerOutputDownloads(mod, inputFiles);
    }

    async function runInfo() {
      const fileEl = document.getElementById('infoFileInput');
      if (!fileEl.files.length) { handleOutput('No file selected.'); return; }
      const inputFiles = Array.from(fileEl.files).map(f => ({file: f, path: '/' + f.name}));

      await runModule(
        document.getElementById('infoRunBtn'),
        ['info', ...inputFiles.map(e => e.path)],
        inputFiles
      );
    }
  </script>
</body>
</html>
