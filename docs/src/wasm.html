<!DOCTYPE html>
<html lang="{{ .Lang }}">
<head>
  <meta charset="UTF-8">
  <title>Auto-Editor cli for wasm</title>
  {{ head_icon }}
  <style>
  {{ core_style }}
  label { color: var(--charcoal-100) }
  input, button, select { margin: 4px 0 }
  #hero { font-family: monospace }
  .notice { color: var(--charcoal-400) }
  #log {
    font-family: monospace;
    background: #111;
    color: #eee;
    padding: 12px;
    height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    font-size: 13px;
    margin-top: 12px;
  }
  button { cursor: pointer; padding: 6px 14px; }
  #downloadArea { margin-top: 12px; }
  .tabs { display: flex; margin-bottom: -1px; }
  .tab-btn { padding: 7px 18px; border: 1px solid #555; background: #1a1a1a; color: #888;
             cursor: pointer; margin: 0}
  .tab-btn.active { background: #2a2a2a; color: #eee; }
  .tab-panel { display: none; border: 1px solid #555; padding: 16px 12px; }
  .tab-panel.active { display: block; }
  </style>
</head>
<body>
  {{ nav }}
<section class="section">
<div class="container">
  <h2 id="hero">Auto-Editor cli for wasm</h2>
  <p class="tiny notice">wasm32 has a memory limit of 4GB. Importing or exporting big files may fail.</p>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('main', this)">Main</button>
    <button class="tab-btn" onclick="switchTab('info', this)">Info</button>
    <button class="tab-btn" onclick="switchTab('whisper', this)">Whisper</button>
  </div>

  <div id="tab-main" class="tab-panel active">
    <label>Input file: <input type="file" id="fileInput"></label><br>
    <label>Arguments: <input type="text" id="argsInput" value="-c:v h264" size="40"></label><br>
    <label>Output name: <input type="text" id="outputName" value="out.mp4" size="20"></label><br>
    <button id="runBtn" onclick="runEditor()">Run</button>
    <button onclick="clearLog()">Clear log</button>
  </div>

  <div id="tab-whisper" class="tab-panel">
    <label>Input file: <input type="file" id="whisperFileInput"></label><br>
    <label>Model file: <input type="file" id="whisperModel" accept=".bin"></label><br>
    <label>Arguments: <input type="text" id="whisperArgs" value="" size="40"></label><br>
    <button id="whisperRunBtn" onclick="runWhisper()">Run</button>
    <button onclick="clearLog()">Clear log</button>
  </div>

  <div id="tab-info" class="tab-panel">
    <label>Input file: <input type="file" id="infoFileInput"></label><br>
    <button id="infoRunBtn" onclick="runInfo()">Run</button>
    <button onclick="clearLog()">Clear log</button>
  </div>

  <div id="log"></div>
  <div id="downloadArea"></div>

  <script src="auto-editor-web.js"></script>
  <script>
    let progressLineActive = false;
    const pendingOutput = [];
    let rafPending = false;

    function switchTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      btn.classList.add('active');
      clearLog();
    }

    function clearLog() {
      document.getElementById('log').textContent = '';
      document.getElementById('downloadArea').innerHTML = '';
      progressLineActive = false;
      pendingOutput.length = 0;
    }

    function stripAnsi(str) {
      return str.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '');
    }

    function flushOutput() {
      rafPending = false;
      if (pendingOutput.length === 0) return;
      const el = document.getElementById('log');
      let text = el.textContent;
      for (const {msg, isProgress} of pendingOutput) {
        if (isProgress) {
          if (progressLineActive) {
            const lastNl = text.lastIndexOf('\n', text.length - 2);
            text = text.substring(0, lastNl + 1) + msg + '\n';
          } else {
            text += msg + '\n';
            progressLineActive = true;
          }
        } else {
          text += msg + '\n';
          progressLineActive = false;
        }
      }
      pendingOutput.length = 0;
      el.textContent = text;
      el.scrollTop = el.scrollHeight;
    }

    function handleOutput(text) {
      const clean = stripAnsi(text);
      if (clean.includes('\r')) {
        pendingOutput.push({msg: clean.replace(/\r/g, '').trimEnd(), isProgress: true});
      } else {
        pendingOutput.push({msg: clean, isProgress: false});
      }
      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(flushOutput);
      }
    }

    function mb(n) { return (n / 1024 / 1024).toFixed(1); }

    function createDownload(data, name) {
      const blob = data instanceof Blob ? data : new Blob([data]);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.textContent = 'Download ' + name;
      const area = document.getElementById('downloadArea');
      area.innerHTML = '';
      area.appendChild(a);
    }

    // entries: [{file, path}]. Returns module on success, null on failure.
    async function runModule(btn, args, entries) {
      btn.disabled = true;
      for (const {file} of entries)
        handleOutput(`<wasm>load ${file.name} (${mb(file.size)} MB)</wasm>`);

      const buffers = await Promise.all(
        entries.map(({file}) => file.arrayBuffer().then(b => new Uint8Array(b)))
      );
      handleOutput('<wasm>$ auto-editor ' + args.join(' ') + '</wasm>');

      let resolve, reject;
      const done = new Promise((res, rej) => { resolve = res; reject = rej; });

      let mod;
      try {
        mod = await AutoEditor({
          arguments: args,
          preRun: [(m) => entries.forEach(({path}, i) => m.FS.writeFile(path, buffers[i]))],
          print:    handleOutput,
          printErr: handleOutput,
          locateFile: (f) => f,
          onExit: (code) => code === 0 ? resolve() : reject(new Error('exited with code ' + code)),
        });
      } catch (e) {
        handleOutput('<wasm>module init failed: ' + e + '</wasm>');
        btn.disabled = false;
        return null;
      }

      try {
        await done;
      } catch (e) {
        handleOutput('<wasm>' + e.message + '</wasm>');
        btn.disabled = false;
        return null;
      }

      btn.disabled = false;
      return mod;
    }

    async function runEditor() {
      const fileEl = document.getElementById('fileInput');
      const outputName = document.getElementById('outputName').value.trim();
      const outputPath = '/' + outputName;
      const extraArgs = document.getElementById('argsInput').value.trim().split(/\s+/).filter(Boolean);

      const hasFile = fileEl.files.length > 0;
      const file = hasFile ? fileEl.files[0] : null;
      const inputPath = hasFile ? '/input.' + file.name.split('.').pop() : null;

      const args = [
        ...(inputPath ? [inputPath] : []),
        ...extraArgs,
        ...(outputName ? ['-o', outputPath] : []),
      ];
      const inputFiles = inputPath ? [{ file, path: inputPath }] : [];

      const mod = await runModule(document.getElementById('runBtn'), args, inputFiles);
      if (!mod || !outputName) return;
      let outData;
      try {
        outData = mod.FS.readFile(outputPath);
      } catch (e) {
        handleOutput('<wasm>could not read output file: ' + e + '</wasm>');
        return;
      }
      handleOutput('<wasm>output size: ' + mb(outData.byteLength) + ' MB</wasm>');
      createDownload(outData, outputName);
    }

    async function runWhisper() {
      const fileEl = document.getElementById('whisperFileInput');
      const modelEl = document.getElementById('whisperModel');
      if (!fileEl.files.length) { handleOutput('No file selected.'); return; }
      if (!modelEl.files.length) { handleOutput('No model file selected.'); return; }
      const file = fileEl.files[0];
      const inputPath = '/input.' + file.name.split('.').pop();
      const extraArgs = document.getElementById('whisperArgs').value.trim().split(/\s+/).filter(Boolean);

      const mod = await runModule(
        document.getElementById('whisperRunBtn'),
        ['whisper', inputPath, '/model.bin', ...extraArgs],
        [{file, path: inputPath}, {file: modelEl.files[0], path: '/model.bin'}]
      );
      if (!mod) return;

      handleOutput('Done.');
      const transcript = document.getElementById('log').textContent;
      createDownload(new Blob([transcript], {type: 'text/plain'}), file.name.replace(/\.[^.]+$/, '') + '.txt');
    }

    async function runInfo() {
      const fileEl = document.getElementById('infoFileInput');
      if (!fileEl.files.length) { handleOutput('No file selected.'); return; }
      const file = fileEl.files[0];
      const inputPath = '/input.' + file.name.split('.').pop();

      await runModule(
        document.getElementById('infoRunBtn'),
        ['info', inputPath],
        [{file, path: inputPath}]
      );
    }
  </script>
</body>
</html>
